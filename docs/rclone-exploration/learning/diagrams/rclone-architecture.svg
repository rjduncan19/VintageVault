<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">rclone Data Flow Architecture</text>
  <text x="400" y="58" fill="#94a3b8" font-size="12" text-anchor="middle">How rclone moves data between storage backends</text>

  <!-- Source Box -->
  <rect x="40" y="90" width="160" height="100" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" rx="8"/>
  <text x="120" y="115" fill="#93c5fd" font-size="11" font-weight="bold" text-anchor="middle">SOURCE</text>
  <text x="120" y="133" fill="#f8fafc" font-size="12" text-anchor="middle">☁️ OneDrive</text>
  <text x="120" y="150" fill="#94a3b8" font-size="10" text-anchor="middle">onedrive-personal:</text>
  <text x="120" y="165" fill="#94a3b8" font-size="10" text-anchor="middle">Microsoft Graph API</text>
  <text x="120" y="180" fill="#64748b" font-size="9" text-anchor="middle">OAuth 2.0 + custom app</text>

  <!-- rclone Engine Box -->
  <rect x="280" y="70" width="240" height="360" fill="#1e293b" stroke="#6366f1" stroke-width="2" rx="8"/>
  <text x="400" y="98" fill="#a5b4fc" font-size="13" font-weight="bold" text-anchor="middle">⚙️ rclone Engine</text>

  <!-- Sub-components -->
  <rect x="295" y="108" width="210" height="40" fill="#0f172a" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="400" y="124" fill="#e2e8f0" font-size="10" text-anchor="middle">Filter Engine</text>
  <text x="400" y="138" fill="#64748b" font-size="9" text-anchor="middle">include/exclude rules, max-size</text>

  <rect x="295" y="155" width="210" height="40" fill="#0f172a" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="400" y="171" fill="#e2e8f0" font-size="10" text-anchor="middle">Comparator</text>
  <text x="400" y="185" fill="#64748b" font-size="9" text-anchor="middle">size, modtime, checksum comparison</text>

  <rect x="295" y="202" width="210" height="40" fill="#0f172a" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="400" y="218" fill="#e2e8f0" font-size="10" text-anchor="middle">Transfer Pool</text>
  <text x="400" y="232" fill="#64748b" font-size="9" text-anchor="middle">--transfers N parallel goroutines</text>

  <rect x="295" y="249" width="210" height="40" fill="#0f172a" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="400" y="265" fill="#e2e8f0" font-size="10" text-anchor="middle">Retry + Backoff</text>
  <text x="400" y="279" fill="#64748b" font-size="9" text-anchor="middle">--retries, exponential backoff</text>

  <rect x="295" y="296" width="210" height="40" fill="#0f172a" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="400" y="312" fill="#e2e8f0" font-size="10" text-anchor="middle">Bandwidth Control</text>
  <text x="400" y="326" fill="#64748b" font-size="9" text-anchor="middle">--bwlimit, --tpslimit</text>

  <rect x="295" y="343" width="210" height="40" fill="#0f172a" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="400" y="359" fill="#e2e8f0" font-size="10" text-anchor="middle">crypt Overlay (optional)</text>
  <text x="400" y="373" fill="#64748b" font-size="9" text-anchor="middle">AES-256 / XSalsa20 encryption</text>

  <rect x="295" y="390" width="210" height="30" fill="#0f172a" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="400" y="410" fill="#e2e8f0" font-size="10" text-anchor="middle">Logger + Stats</text>

  <!-- Destination boxes -->
  <!-- SSD -->
  <rect x="600" y="80" width="160" height="80" fill="#1a3a2a" stroke="#22c55e" stroke-width="2" rx="8"/>
  <text x="680" y="103" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">DESTINATION A</text>
  <text x="680" y="120" fill="#f8fafc" font-size="12" text-anchor="middle">💾 External SSD</text>
  <text x="680" y="137" fill="#94a3b8" font-size="10" text-anchor="middle">E:\OneDrive-Backup</text>
  <text x="680" y="151" fill="#64748b" font-size="9" text-anchor="middle">local filesystem</text>

  <!-- OneDrive B -->
  <rect x="600" y="195" width="160" height="90" fill="#2a1a3a" stroke="#a855f7" stroke-width="2" rx="8"/>
  <text x="680" y="217" fill="#d8b4fe" font-size="11" font-weight="bold" text-anchor="middle">DESTINATION B</text>
  <text x="680" y="234" fill="#f8fafc" font-size="12" text-anchor="middle">☁️ OneDrive (B)</text>
  <text x="680" y="251" fill="#94a3b8" font-size="10" text-anchor="middle">onedrive-backup:</text>
  <text x="680" y="265" fill="#94a3b8" font-size="10" text-anchor="middle">VaultBackup/latest</text>
  <text x="680" y="279" fill="#64748b" font-size="9" text-anchor="middle">server-side copy ⚡</text>

  <!-- Google Drive -->
  <rect x="600" y="325" width="160" height="70" fill="#3a2a1a" stroke="#f59e0b" stroke-width="2" rx="8"/>
  <text x="680" y="347" fill="#fcd34d" font-size="11" font-weight="bold" text-anchor="middle">DESTINATION C</text>
  <text x="680" y="364" fill="#f8fafc" font-size="12" text-anchor="middle">☁️ Google Drive</text>
  <text x="680" y="381" fill="#94a3b8" font-size="10" text-anchor="middle">gdrive:VaultBackup</text>

  <!-- Arrows: Source to rclone -->
  <line x1="200" y1="140" x2="278" y2="200" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Arrows: rclone to destinations -->
  <line x1="522" y1="170" x2="598" y2="130" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="522" y1="240" x2="598" y2="240" stroke="#a855f7" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="522" y1="300" x2="598" y2="350" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Config file box -->
  <rect x="40" y="240" width="160" height="80" fill="#1e293b" stroke="#475569" stroke-width="1" rx="8"/>
  <text x="120" y="260" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">rclone.conf</text>
  <text x="120" y="275" fill="#64748b" font-size="9" text-anchor="middle">%APPDATA%\rclone\</text>
  <text x="120" y="289" fill="#64748b" font-size="9" text-anchor="middle">• OAuth tokens</text>
  <text x="120" y="302" fill="#64748b" font-size="9" text-anchor="middle">• client_id / secret</text>
  <text x="120" y="315" fill="#64748b" font-size="9" text-anchor="middle">• drive_id per remote</text>

  <line x1="200" y1="280" x2="278" y2="280" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Filter file box -->
  <rect x="40" y="360" width="160" height="80" fill="#1e293b" stroke="#475569" stroke-width="1" rx="8"/>
  <text x="120" y="380" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">filters.txt</text>
  <text x="120" y="395" fill="#64748b" font-size="9" text-anchor="middle">C:\Backup\</text>
  <text x="120" y="409" fill="#64748b" font-size="9" text-anchor="middle">- /Videos/**</text>
  <text x="120" y="423" fill="#64748b" font-size="9" text-anchor="middle">- *.tmp</text>
  <text x="120" y="437" fill="#64748b" font-size="9" text-anchor="middle">+ **</text>

  <line x1="200" y1="400" x2="293" y2="130" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <text x="40" y="468" fill="#64748b" font-size="10">⚡ = server-side copy (no download to PC)</text>
  <text x="300" y="468" fill="#64748b" font-size="10">--- = configuration input</text>
</svg>
