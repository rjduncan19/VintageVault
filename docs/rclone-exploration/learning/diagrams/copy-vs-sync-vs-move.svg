<svg viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="800" height="440" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">rclone Operations: copy vs. sync vs. move</text>
  <text x="400" y="54" fill="#94a3b8" font-size="12" text-anchor="middle">Understanding what each operation does to your data</text>

  <!-- ══ BEFORE STATE ══ -->
  <text x="120" y="85" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">BEFORE (always same)</text>

  <!-- Source before -->
  <rect x="30" y="95" width="180" height="130" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" rx="6"/>
  <text x="120" y="115" fill="#93c5fd" font-size="11" font-weight="bold" text-anchor="middle">Source</text>
  <text x="50" y="135" fill="#f8fafc" font-size="11">📄 A.txt (new)</text>
  <text x="50" y="155" fill="#f8fafc" font-size="11">📄 B.txt</text>
  <text x="50" y="175" fill="#f8fafc" font-size="11">📄 C.txt</text>
  <text x="50" y="200" fill="#64748b" font-size="9">← not in dest</text>

  <!-- Dest before -->
  <rect x="230" y="95" width="180" height="130" fill="#1e293b" stroke="#475569" stroke-width="1.5" rx="6"/>
  <text x="320" y="115" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">Destination (Before)</text>
  <text x="250" y="135" fill="#f8fafc" font-size="11">📄 A.txt (old) ⬅</text>
  <text x="250" y="170" fill="#f8fafc" font-size="11">📄 D.txt</text>
  <text x="250" y="188" fill="#64748b" font-size="9">← not in source</text>

  <!-- Separator vertical -->
  <line x1="430" y1="70" x2="430" y2="430" stroke="#334155" stroke-width="1"/>

  <!-- ══ COPY ══ -->
  <text x="530" y="85" fill="#22c55e" font-size="14" font-weight="bold" text-anchor="middle">rclone copy</text>
  <rect x="440" y="95" width="200" height="150" fill="#1a3a2a" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="540" y="115" fill="#86efac" font-size="10" font-weight="bold" text-anchor="middle">Destination AFTER copy</text>
  <text x="460" y="138" fill="#f8fafc" font-size="11">📄 A.txt (new) ✅</text>
  <text x="460" y="155" fill="#22c55e" font-size="11">📄 B.txt ← NEW</text>
  <text x="460" y="172" fill="#22c55e" font-size="11">📄 C.txt ← NEW</text>
  <text x="460" y="189" fill="#f8fafc" font-size="11">📄 D.txt 🟡 kept</text>

  <text x="540" y="215" fill="#22c55e" font-size="10" text-anchor="middle">✅ New files copied</text>
  <text x="540" y="228" fill="#22c55e" font-size="10" text-anchor="middle">✅ A.txt updated</text>
  <text x="540" y="241" fill="#22c55e" font-size="10" text-anchor="middle">✅ D.txt preserved</text>

  <!-- ══ SYNC ══ -->
  <text x="530" y="270" fill="#f59e0b" font-size="14" font-weight="bold" text-anchor="middle">rclone sync</text>
  <rect x="440" y="280" width="200" height="145" fill="#3a2a1a" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="540" y="300" fill="#fcd34d" font-size="10" font-weight="bold" text-anchor="middle">Destination AFTER sync</text>
  <text x="460" y="323" fill="#f8fafc" font-size="11">📄 A.txt (new) ✅</text>
  <text x="460" y="340" fill="#22c55e" font-size="11">📄 B.txt ← NEW</text>
  <text x="460" y="357" fill="#22c55e" font-size="11">📄 C.txt ← NEW</text>
  <text x="460" y="376" fill="#ef4444" font-size="11">❌ D.txt DELETED</text>

  <text x="540" y="400" fill="#f59e0b" font-size="10" text-anchor="middle">⚠️ D.txt removed!</text>
  <text x="540" y="413" fill="#f59e0b" font-size="10" text-anchor="middle">dest = exact mirror of src</text>

  <!-- ══ MOVE (smaller, at right) ══ -->
  <rect x="670" y="95" width="120" height="240" fill="#2a1a1a" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="730" y="112" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle">rclone move</text>
  <text x="730" y="130" fill="#64748b" font-size="9" text-anchor="middle">Source AFTER:</text>
  <text x="680" y="148" fill="#ef4444" font-size="10">❌ A.txt deleted</text>
  <text x="680" y="163" fill="#ef4444" font-size="10">❌ B.txt deleted</text>
  <text x="680" y="178" fill="#ef4444" font-size="10">❌ C.txt deleted</text>
  <text x="680" y="197" fill="#64748b" font-size="9" text-anchor="middle">Dest AFTER:</text>
  <text x="680" y="213" fill="#f8fafc" font-size="10">📄 A.txt (new)</text>
  <text x="680" y="228" fill="#f8fafc" font-size="10">📄 B.txt</text>
  <text x="680" y="243" fill="#f8fafc" font-size="10">📄 C.txt</text>
  <text x="680" y="258" fill="#f8fafc" font-size="10">📄 D.txt kept</text>

  <text x="730" y="280" fill="#ef4444" font-size="9" text-anchor="middle">Source ERASED</text>
  <text x="730" y="293" fill="#ef4444" font-size="9" text-anchor="middle">migration only!</text>
  <text x="730" y="310" fill="#64748b" font-size="9" text-anchor="middle">never for backup</text>

  <!-- Legend strip at bottom left -->
  <rect x="30" y="255" width="380" height="160" fill="#1e293b" stroke="#334155" stroke-width="1" rx="6"/>
  <text x="220" y="274" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">For Backup: ALWAYS use copy</text>
  <text x="50" y="295" fill="#22c55e" font-size="11">✅ copy</text>
  <text x="110" y="295" fill="#94a3b8" font-size="10">→ backup, incremental, additive-only</text>
  <text x="50" y="315" fill="#f59e0b" font-size="11">⚠️ sync</text>
  <text x="110" y="315" fill="#94a3b8" font-size="10">→ mirroring only (use --backup-dir too)</text>
  <text x="50" y="335" fill="#ef4444" font-size="11">❌ move</text>
  <text x="110" y="335" fill="#94a3b8" font-size="10">→ one-way migration (destroys source)</text>

  <rect x="45" y="348" width="350" height="58" fill="#0f172a" stroke="#475569" stroke-width="1" rx="4"/>
  <text x="55" y="365" fill="#f59e0b" font-size="10">Ransomware scenario with sync:</text>
  <text x="55" y="380" fill="#64748b" font-size="9">1. Ransomware encrypts OneDrive A files</text>
  <text x="55" y="393" fill="#64748b" font-size="9">2. rclone sync runs → copies encrypted files, DELETES good backup files</text>
  <text x="55" y="406" fill="#ef4444" font-size="9">→ Your backup is now also encrypted! Use copy instead.</text>
</svg>
