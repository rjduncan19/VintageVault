<svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="800" height="560" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">Ransomware Protection: OneDrive → OneDrive Backup</text>
  <text x="400" y="58" fill="#94a3b8" font-size="12" text-anchor="middle">Isolated account separation prevents backup corruption</text>

  <!-- ═══ BEFORE ATTACK COLUMN ═══ -->
  <text x="180" y="90" fill="#22c55e" font-size="13" font-weight="bold" text-anchor="middle">✅ Normal State</text>

  <!-- Your PC -->
  <rect x="60" y="105" width="240" height="70" fill="#1e293b" stroke="#334155" stroke-width="1" rx="6"/>
  <text x="180" y="125" fill="#94a3b8" font-size="11" text-anchor="middle">🖥️ Your PC</text>
  <text x="180" y="142" fill="#64748b" font-size="10" text-anchor="middle">OneDrive sync client running</text>
  <text x="180" y="156" fill="#64748b" font-size="10" text-anchor="middle">Account A credentials stored</text>
  <text x="180" y="165" fill="#475569" font-size="9" text-anchor="middle">(Account B credentials NOT here)</text>

  <!-- OneDrive A -->
  <rect x="60" y="195" width="240" height="80" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="180" y="217" fill="#93c5fd" font-size="11" font-weight="bold" text-anchor="middle">☁️ OneDrive Account A</text>
  <text x="180" y="233" fill="#f8fafc" font-size="11" text-anchor="middle">📄 Documents/ ✅</text>
  <text x="180" y="248" fill="#f8fafc" font-size="11" text-anchor="middle">📷 Photos/ ✅</text>
  <text x="180" y="263" fill="#f8fafc" font-size="11" text-anchor="middle">📊 Spreadsheets/ ✅</text>

  <!-- Arrow: A to B (backup) -->
  <line x1="300" y1="290" x2="460" y2="290" stroke="#22c55e" stroke-width="2" marker-end="url(#ok-arrow)" stroke-dasharray="6,3"/>
  <text x="380" y="280" fill="#22c55e" font-size="10" text-anchor="middle">rclone backup</text>
  <text x="380" y="304" fill="#22c55e" font-size="10" text-anchor="middle">daily 2:00 AM ⏰</text>

  <!-- OneDrive B -->
  <rect x="460" y="195" width="280" height="120" fill="#1a3a2a" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="600" y="217" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">☁️ OneDrive Account B (Backup)</text>
  <text x="600" y="235" fill="#f8fafc" font-size="10" text-anchor="middle">VaultBackup/</text>
  <text x="600" y="250" fill="#94a3b8" font-size="10" text-anchor="middle">├── latest/</text>
  <text x="600" y="265" fill="#94a3b8" font-size="10" text-anchor="middle">├── 2026-06-23/ (snapshot)</text>
  <text x="600" y="280" fill="#94a3b8" font-size="10" text-anchor="middle">├── 2026-06-16/ (snapshot)</text>
  <text x="600" y="295" fill="#94a3b8" font-size="10" text-anchor="middle">└── 2026-06-09/ (snapshot)</text>
  <text x="600" y="308" fill="#64748b" font-size="9" text-anchor="middle">No sync client, no local credentials</text>

  <!-- Separator -->
  <line x1="40" y1="350" x2="760" y2="350" stroke="#ef4444" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="400" y="345" fill="#ef4444" font-size="11" font-weight="bold" text-anchor="middle">◀── RANSOMWARE ATTACK ──▶</text>

  <!-- ═══ AFTER ATTACK COLUMN ═══ -->
  <text x="200" y="380" fill="#ef4444" font-size="13" font-weight="bold" text-anchor="middle">🦠 After Attack (Account A Compromised)</text>

  <!-- Infected PC -->
  <rect x="60" y="395" width="240" height="70" fill="#3a1a1a" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="180" y="415" fill="#fca5a5" font-size="11" text-anchor="middle">🦠 Your PC (INFECTED)</text>
  <text x="180" y="432" fill="#64748b" font-size="10" text-anchor="middle">Ransomware encrypts local files</text>
  <text x="180" y="447" fill="#64748b" font-size="10" text-anchor="middle">OneDrive client syncs UP ⬆️</text>
  <text x="180" y="458" fill="#475569" font-size="9" text-anchor="middle">Account A token gets encrypted too</text>

  <!-- Infected OneDrive A -->
  <rect x="60" y="480" width="240" height="65" fill="#3a1a1a" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="180" y="500" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle">☁️ OneDrive Account A ⚠️</text>
  <text x="180" y="517" fill="#fca5a5" font-size="11" text-anchor="middle">🔒 Documents.encrypted</text>
  <text x="180" y="532" fill="#fca5a5" font-size="11" text-anchor="middle">🔒 Photos.encrypted</text>

  <!-- Blocked arrow (can't reach B) -->
  <line x1="300" y1="512" x2="380" y2="512" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="350" y="495" fill="#ef4444" font-size="20" text-anchor="middle">🚫</text>

  <!-- Account B safe -->
  <rect x="460" y="395" width="280" height="140" fill="#1a3a2a" stroke="#22c55e" stroke-width="2" rx="6"/>
  <text x="600" y="415" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">☁️ OneDrive Account B ✅ SAFE</text>
  <text x="600" y="432" fill="#f8fafc" font-size="10" text-anchor="middle">No backup ran during attack</text>
  <text x="600" y="447" fill="#94a3b8" font-size="10" text-anchor="middle">latest/ ← June 30 (last good backup)</text>
  <text x="600" y="462" fill="#94a3b8" font-size="10" text-anchor="middle">2026-06-23/ ← week before</text>
  <text x="600" y="477" fill="#94a3b8" font-size="10" text-anchor="middle">2026-06-16/ ← two weeks before</text>
  <text x="600" y="500" fill="#22c55e" font-size="11" font-weight="bold" text-anchor="middle">→ Restore from here on clean device</text>
  <text x="600" y="515" fill="#64748b" font-size="10" text-anchor="middle">rclone copy onedrive-backup:VaultBackup/</text>
  <text x="600" y="528" fill="#64748b" font-size="10" text-anchor="middle">latest/ D:\Restored\ --progress</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="ok-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Key isolation callout -->
  <rect x="40" y="100" width="20" height="20" fill="none" stroke="#f59e0b" stroke-width="1.5" rx="3"/>
  <text x="50" y="114" fill="#f59e0b" font-size="9" text-anchor="middle">!</text>
  <text x="68" y="114" fill="#fcd34d" font-size="9">Account B has no sync client installed on any compromised device</text>
</svg>
