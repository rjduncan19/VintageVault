<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#334155" stroke-width="4"/>
  <!-- Stylized V that looks like a vault/chevron -->
  <g transform="translate(256, 200)">
    <!-- Left side of V -->
    <path d="M-120,-80 L0,80 L0,40 L-90,-60 Z" fill="url(#grad2)" opacity="0.9"/>
    <!-- Right side of V -->
    <path d="M120,-80 L0,80 L0,40 L90,-60 Z" fill="#3b82f6" opacity="0.8"/>
  </g>
  <!-- Cloud integrated into the V -->
  <g transform="translate(256, 165)">
    <ellipse cx="0" cy="10" rx="55" ry="28" fill="#ffffff" opacity="0.9"/>
    <circle cx="-28" cy="-2" r="26" fill="#ffffff" opacity="0.9"/>
    <circle cx="15" cy="-10" r="32" fill="#ffffff" opacity="0.9"/>
    <circle cx="-5" cy="-18" r="22" fill="#ffffff" opacity="0.9"/>
  </g>
  <!-- Small lock on cloud -->
  <g transform="translate(256, 165)">
    <rect x="-8" y="-3" width="16" height="13" rx="2" fill="#1e40af"/>
    <path d="M-5 -3 L-5 -8 C-5 -14 5 -14 5 -8 L5 -3" fill="none" stroke="#1e40af" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="3" r="2.5" fill="#60a5fa"/>
  </g>
  <!-- Text below -->
  <text x="256" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="#e2e8f0" letter-spacing="4">VINTAGE</text>
  <text x="256" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="300" fill="#60a5fa" letter-spacing="8">VAULT</text>
</svg>
