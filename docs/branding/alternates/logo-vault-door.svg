<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="vaultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <!-- Outer vault door circle -->
  <circle cx="256" cy="256" r="230" fill="url(#vaultGrad)" stroke="#334155" stroke-width="6"/>
  <!-- Vault ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#ringGrad)" stroke-width="8"/>
  <!-- Vault ring details (bolt marks) -->
  <circle cx="256" cy="76" r="10" fill="#475569"/>
  <circle cx="256" cy="436" r="10" fill="#475569"/>
  <circle cx="76" cy="256" r="10" fill="#475569"/>
  <circle cx="436" cy="256" r="10" fill="#475569"/>
  <circle cx="128" cy="128" r="8" fill="#475569"/>
  <circle cx="384" cy="128" r="8" fill="#475569"/>
  <circle cx="128" cy="384" r="8" fill="#475569"/>
  <circle cx="384" cy="384" r="8" fill="#475569"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="140" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <!-- Cloud inside vault -->
  <g transform="translate(256, 240)">
    <ellipse cx="0" cy="18" rx="72" ry="38" fill="#60a5fa" opacity="0.9"/>
    <circle cx="-35" cy="0" r="36" fill="#60a5fa" opacity="0.9"/>
    <circle cx="25" cy="-8" r="42" fill="#60a5fa" opacity="0.9"/>
    <circle cx="-5" cy="-20" r="32" fill="#60a5fa" opacity="0.9"/>
  </g>
  <!-- Checkmark on cloud -->
  <g transform="translate(256, 242)">
    <polyline points="-18,2 -6,14 20,-12" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Vault handle -->
  <g transform="translate(370, 256)">
    <line x1="0" y1="-35" x2="0" y2="35" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="-35" r="8" fill="#94a3b8"/>
    <circle cx="0" cy="35" r="8" fill="#94a3b8"/>
    <circle cx="0" cy="0" r="5" fill="#64748b"/>
  </g>
</svg>
