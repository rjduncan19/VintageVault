<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="vGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="vGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#334155" stroke-width="4"/>

  <!-- Interlocked VV — shares the middle stroke -->
  <g transform="translate(256, 200)">
    <!-- Left V: left arm -->
    <path d="M-130,-80 L-40,80 L-26,80 L-26,45 L-100,-58 Z" fill="url(#vGrad1)" opacity="0.9"/>
    <!-- Left V: right arm (shared center) -->
    <path d="M0,-80 L-40,80 L-54,80 L-54,45 L-28,-58 Z" fill="#3b82f6" opacity="0.75"/>

    <!-- Right V: left arm (shared center) -->
    <path d="M0,-80 L40,80 L54,80 L54,45 L28,-58 Z" fill="url(#vGrad2)" opacity="0.9"/>
    <!-- Right V: right arm -->
    <path d="M130,-80 L40,80 L26,80 L26,45 L100,-58 Z" fill="#2563eb" opacity="0.75"/>
  </g>

  <!-- Cloud centered above the VV -->
  <g transform="translate(256, 148)">
    <ellipse cx="0" cy="12" rx="55" ry="27" fill="#ffffff" opacity="0.95"/>
    <circle cx="-26" cy="0" r="25" fill="#ffffff" opacity="0.95"/>
    <circle cx="15" cy="-9" r="30" fill="#ffffff" opacity="0.95"/>
    <circle cx="-5" cy="-17" r="21" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Lock on cloud -->
  <g transform="translate(256, 148)">
    <rect x="-7" y="-2" width="14" height="11" rx="2" fill="#1e40af"/>
    <path d="M-4 -2 L-4 -7 C-4 -12 4 -12 4 -7 L4 -2" fill="none" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="3" r="2" fill="#60a5fa"/>
  </g>

  <!-- Text -->
  <text x="256" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#e2e8f0" letter-spacing="4">VINTAGE</text>
  <text x="256" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="300" fill="#60a5fa" letter-spacing="8">VAULT</text>
</svg>
