<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="vOuter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="vInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#334155" stroke-width="4"/>

  <!-- Outer V (larger, behind) -->
  <g transform="translate(256, 190)">
    <path d="M-130,-85 L0,100 L14,100 L14,60 L-98,-62 Z" fill="url(#vOuter)" opacity="0.7"/>
    <path d="M130,-85 L0,100 L-14,100 L-14,60 L98,-62 Z" fill="#2563eb" opacity="0.6"/>
  </g>

  <!-- Inner V (smaller, in front) -->
  <g transform="translate(256, 195)">
    <path d="M-85,-60 L0,72 L10,72 L10,42 L-60,-42 Z" fill="url(#vInner)" opacity="0.95"/>
    <path d="M85,-60 L0,72 L-10,72 L-10,42 L60,-42 Z" fill="#3b82f6" opacity="0.85"/>
  </g>

  <!-- Cloud at the top where the V's converge -->
  <g transform="translate(256, 155)">
    <ellipse cx="0" cy="12" rx="50" ry="25" fill="#ffffff" opacity="0.95"/>
    <circle cx="-24" cy="0" r="23" fill="#ffffff" opacity="0.95"/>
    <circle cx="13" cy="-8" r="28" fill="#ffffff" opacity="0.95"/>
    <circle cx="-4" cy="-15" r="19" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Lock on cloud -->
  <g transform="translate(256, 155)">
    <rect x="-7" y="-2" width="14" height="11" rx="2" fill="#1e40af"/>
    <path d="M-4 -2 L-4 -7 C-4 -12 4 -12 4 -7 L4 -2" fill="none" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="3" r="2" fill="#60a5fa"/>
  </g>

  <!-- Text -->
  <text x="256" y="372" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#e2e8f0" letter-spacing="4">VINTAGE</text>
  <text x="256" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="300" fill="#60a5fa" letter-spacing="8">VAULT</text>
</svg>
