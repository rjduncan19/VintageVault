<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="vLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="vRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#334155" stroke-width="4"/>

  <!-- First V (left, behind) -->
  <g transform="translate(196, 195)">
    <path d="M-95,-75 L0,85 L12,85 L12,50 L-65,-55 Z" fill="url(#vLeft)" opacity="0.85"/>
    <path d="M95,-75 L0,85 L-12,85 L-12,50 L65,-55 Z" fill="#3b82f6" opacity="0.7"/>
  </g>

  <!-- Second V (right, in front, overlapping) -->
  <g transform="translate(316, 195)">
    <path d="M-95,-75 L0,85 L12,85 L12,50 L-65,-55 Z" fill="url(#vRight)" opacity="0.9"/>
    <path d="M95,-75 L0,85 L-12,85 L-12,50 L65,-55 Z" fill="#1e40af" opacity="0.8"/>
  </g>

  <!-- Cloud nestled between the two V's -->
  <g transform="translate(256, 160)">
    <ellipse cx="0" cy="12" rx="52" ry="26" fill="#ffffff" opacity="0.95"/>
    <circle cx="-25" cy="0" r="24" fill="#ffffff" opacity="0.95"/>
    <circle cx="14" cy="-8" r="30" fill="#ffffff" opacity="0.95"/>
    <circle cx="-4" cy="-16" r="20" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Small lock on cloud -->
  <g transform="translate(256, 160)">
    <rect x="-7" y="-2" width="14" height="11" rx="2" fill="#1e40af"/>
    <path d="M-4 -2 L-4 -7 C-4 -12 4 -12 4 -7 L4 -2" fill="none" stroke="#1e40af" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="3" r="2" fill="#60a5fa"/>
  </g>

  <!-- Text below -->
  <text x="256" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#e2e8f0" letter-spacing="4">VINTAGE</text>
  <text x="256" y="413" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="300" fill="#60a5fa" letter-spacing="8">VAULT</text>
</svg>
