<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Shield body -->
  <path d="M256 42 L462 120 C462 120 472 310 256 472 C40 310 50 120 50 120 Z" fill="url(#shieldGrad)" stroke="#1e40af" stroke-width="4"/>
  <!-- Inner shield highlight -->
  <path d="M256 70 L432 138 C432 138 440 300 256 440 C72 300 80 138 80 138 Z" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  <!-- Cloud shape inside shield -->
  <g transform="translate(256, 220)">
    <ellipse cx="0" cy="15" rx="90" ry="50" fill="url(#cloudGrad)" opacity="0.95"/>
    <circle cx="-45" cy="-5" r="45" fill="url(#cloudGrad)" opacity="0.95"/>
    <circle cx="30" cy="-15" r="55" fill="url(#cloudGrad)" opacity="0.95"/>
    <circle cx="-10" cy="-30" r="40" fill="url(#cloudGrad)" opacity="0.95"/>
  </g>
  <!-- Lock/keyhole on cloud -->
  <g transform="translate(256, 215)">
    <!-- Lock body -->
    <rect x="-18" y="-2" width="36" height="28" rx="4" fill="#1e40af"/>
    <!-- Lock shackle -->
    <path d="M-12 -2 L-12 -14 C-12 -25 12 -25 12 -14 L12 -2" fill="none" stroke="#1e40af" stroke-width="5" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="10" r="5" fill="#60a5fa"/>
    <rect x="-2.5" y="12" width="5" height="8" rx="1" fill="#60a5fa"/>
  </g>
</svg>
